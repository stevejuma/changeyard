name: live-smoke-prereq

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Provider to run
        default: all
        required: false
        type: choice
        options:
          - all
          - github
          - gitlab
          - forgejo
      scope_check:
        description: Enable scope diagnostics
        required: false
        default: "0"

jobs:
  run-live-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        provider: [github, gitlab, forgejo]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Prepare pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate
      - name: Install jj for deeper local checks
        env:
          JJ_VERSION: 0.42.0
        run: |
          tmp="$(mktemp -d)"
          curl -fsSL "https://github.com/jj-vcs/jj/releases/download/v${JJ_VERSION}/jj-v${JJ_VERSION}-x86_64-unknown-linux-musl.tar.gz" -o "${tmp}/jj.tar.gz"
          tar -xzf "${tmp}/jj.tar.gz" -C "${tmp}"
          sudo install "${tmp}/jj" /usr/local/bin/jj
          jj --version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Skip unrelated provider
        if: ${{ github.event.inputs.provider != 'all' && github.event.inputs.provider != matrix.provider }}
        run: echo "Skipping ${matrix.provider} smoke run"
      - name: Run live smoke for ${{ matrix.provider }}
        if: ${{ github.event.inputs.provider == 'all' || github.event.inputs.provider == matrix.provider }}
        env:
          CHANGEYARD_LIVE_SMOKE: "1"
          CHANGEYARD_LIVE_SMOKE_SCOPE_CHECK: ${{ github.event.inputs.scope_check }}
          GITHUB_OWNER: ${{ secrets.CHANGEYARD_GITHUB_OWNER }}
          GITHUB_REPO: ${{ secrets.CHANGEYARD_GITHUB_REPO }}
          GITHUB_TOKEN: ${{ secrets.CHANGEYARD_GITHUB_TOKEN }}
          GITLAB_OWNER: ${{ secrets.CHANGEYARD_GITLAB_OWNER }}
          GITLAB_REPO: ${{ secrets.CHANGEYARD_GITLAB_REPO }}
          GITLAB_TOKEN: ${{ secrets.CHANGEYARD_GITLAB_TOKEN }}
          FORGEJO_OWNER: ${{ secrets.CHANGEYARD_FORGEJO_OWNER }}
          FORGEJO_REPO: ${{ secrets.CHANGEYARD_FORGEJO_REPO }}
          FORGEJO_BASE_URL: ${{ secrets.CHANGEYARD_FORGEJO_BASE_URL }}
          FORGE_TOKEN: ${{ secrets.CHANGEYARD_FORGEJO_TOKEN }}
        run: |
          if [ "${{ matrix.provider }}" = "github" ] && [ -z "${GITHUB_OWNER}" ]; then
            echo "Skipping GitHub smoke: missing CHANGEYARD_GITHUB_* secrets"
            exit 0
          fi
          if [ "${{ matrix.provider }}" = "gitlab" ] && [ -z "${GITLAB_OWNER}" ]; then
            echo "Skipping GitLab smoke: missing CHANGEYARD_GITLAB_* secrets"
            exit 0
          fi
          if [ "${{ matrix.provider }}" = "forgejo" ] && [ -z "${FORGEJO_BASE_URL}" ]; then
            echo "Skipping Forgejo smoke: missing CHANGEYARD_FORGEJO_* secrets"
            exit 0
          fi
          node scripts/live-forge-smoke.mjs "${{ matrix.provider }}"
