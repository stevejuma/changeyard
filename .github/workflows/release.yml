name: publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to the package registry
        required: false
        default: "false"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Prepare pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and validate package
        run: pnpm run pack:check
      - name: Run install-from-tarball smoke
        run: pnpm run smoke:install
      - name: Publish to package registry
        if: ${{ github.event_name == 'release' || github.event.inputs.publish == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NODE_AUTH_TOKEN missing; skipping publish"
            exit 0
          fi
          pnpm publish --provenance --access public
