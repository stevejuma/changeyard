name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Enable package manager
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install jj for workspace coverage
        run: |
          sudo apt-get update
          sudo apt-get install -y jj
      - name: Build
        run: pnpm run build
      - name: Run tests
        run: pnpm test
      - name: Package dry-run
        run: pnpm run pack:check
  bun-tui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Enable package manager
        run: corepack enable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Node runtime
        run: pnpm run build
      - name: Typecheck TUI
        run: pnpm run check:tui
      - name: Build TUI bundle
        run: pnpm run build:tui
      - name: Run TUI smoke
        run: pnpm run smoke:tui
