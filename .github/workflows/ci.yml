name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Prepare pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install jj for workspace coverage
        env:
          JJ_VERSION: 0.42.0
        run: |
          tmp="$(mktemp -d)"
          curl -fsSL "https://github.com/jj-vcs/jj/releases/download/v${JJ_VERSION}/jj-v${JJ_VERSION}-x86_64-unknown-linux-musl.tar.gz" -o "${tmp}/jj.tar.gz"
          tar -xzf "${tmp}/jj.tar.gz" -C "${tmp}"
          sudo install "${tmp}/jj" /usr/local/bin/jj
          jj --version
      - name: Run complete validation
        run: pnpm run check:all
      - name: Package dry-run
        run: pnpm run pack:check
  bun-tui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Prepare pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build Node runtime
        run: pnpm run build
      - name: Typecheck TUI
        run: pnpm run check:tui
      - name: Build TUI bundle
        run: pnpm run build:tui
      - name: Run TUI smoke
        run: pnpm run smoke:tui
