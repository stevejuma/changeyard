name: ci

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  build-test-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install jj for workspace coverage
        run: |
          sudo apt-get update
          sudo apt-get install -y jj
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test
      - name: Package dry-run
        run: npm run pack:check
  bun-tui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: npm ci
      - name: Build Node runtime
        run: npm run build
      - name: Typecheck TUI
        run: npm run check:tui
      - name: Build TUI bundle
        run: npm run build:tui
      - name: Run TUI smoke
        run: npm run smoke:tui
