<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
		<link
			rel="icon"
			href='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 92 95%22><path fill=%22%23E6EDF3%22 fill-rule=%22nonzero%22 d=%22M65.45 15.8c10.89 0 19.71 8.865 19.71 19.8v6.6l5.74 11.465a4.8 4.8 0 0 1-.007 4.595L85.16 68.6v6.6c0 10.935-8.83 19.8-19.71 19.8H26.02c-10.89 0-19.71-8.865-19.71-19.8v-6.6L.45 57.295a4.8 4.8 0 0 1-.008-3.666L6.31 42.2v-6.6c0-10.935 8.83-19.8 19.71-19.8h39.43ZM30.73 38c-4.97 0-9 4.03-9 9v16c0 4.97 4.03 9 9 9s9-4.03 9-9V47c0-4.97-4.03-9-9-9Zm29 0c-4.97 0-9 4.03-9 9v16c0 4.97 4.03 9 9 9s9-4.03 9-9V47c0-4.97-4.03-9-9-9Z%22/><circle fill=%22%23E6EDF3%22 cx=%2245.735%22 cy=%2211%22 r=%2211%22/></svg>'
		/>
		<link rel="manifest" href="/manifest.json" />
		<meta name="theme-color" content="#24292E" />
		<title>Changeyard</title>
	</head>
	<body>
		<div id="app-shell-fallback">
			<div
				style="
					min-height: 100vh;
					background: #0d1117;
					color: #e6edf3;
					font-family:
						Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
				"
			>
				<div style="height: 2px; overflow: hidden; background: #21262d">
					<div style="height: 100%; width: 33%; background: #58a6ff"></div>
				</div>
				<div style="display: flex; min-height: calc(100vh - 2px)">
					<aside style="width: 320px; border-right: 1px solid #30363d; background: #161b22; padding: 16px">
						<div style="height: 20px; width: 140px; border-radius: 6px; background: #30363d"></div>
						<div style="margin-top: 22px; display: grid; gap: 10px">
							<div style="height: 44px; border-radius: 6px; background: #21262d"></div>
							<div style="height: 44px; border-radius: 6px; background: #21262d"></div>
							<div style="height: 44px; border-radius: 6px; background: #21262d"></div>
						</div>
					</aside>
					<main style="flex: 1; min-width: 0; padding: 16px">
						<div style="height: 36px; border-bottom: 1px solid #30363d"></div>
						<div style="margin-top: 16px; display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px">
							<div style="height: 240px; border: 1px solid #30363d; border-radius: 6px; background: #161b22"></div>
							<div style="height: 240px; border: 1px solid #30363d; border-radius: 6px; background: #161b22"></div>
							<div style="height: 240px; border: 1px solid #30363d; border-radius: 6px; background: #161b22"></div>
							<div style="height: 240px; border: 1px solid #30363d; border-radius: 6px; background: #161b22"></div>
						</div>
					</main>
				</div>
			</div>
		</div>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
		<script>
			if ("serviceWorker" in navigator) {
				navigator.serviceWorker.getRegistrations().then(function (registrations) {
					registrations.forEach(function (registration) {
						registration.unregister();
					});
				});
			}
		</script>
	</body>
</html>
